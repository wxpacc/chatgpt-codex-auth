<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT Auth Bridge</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e3eb;
    --text-secondary: #8b8fa3;
    --accent: #0f766e;
    --accent-hover: #0d9488;
    --success: #22c55e;
    --danger: #ef4444;
    --danger-bg: #3b1414;
    --radius: 8px;
  }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 20px 16px;
  }

  .shell { max-width: 1000px; margin: 0 auto; }

  /* --- top bar --- */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 10px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand .icon {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), #14b8a6);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 1.1rem;
  }
  .brand h1 { font-size: 1.1rem; font-weight: 600; }
  .brand span { font-size: 0.75rem; color: var(--text-secondary); display: block; }

  .toolbar { display: flex; align-items: center; gap: 8px; }

  button, .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 7px 14px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 0.8125rem;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    color: var(--text);
    transition: background 0.15s, border-color 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }
  button:hover:not(:disabled) { background: var(--border); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover:not(:disabled) { background: var(--accent-hover); border-color: var(--accent-hover); }

  .btn-sm { padding: 4px 10px; font-size: 0.75rem; }

  /* --- status bar --- */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.8125rem;
    color: var(--text-secondary);
    margin-bottom: 14px;
    padding: 6px 0;
  }
  .status-bar svg { flex-shrink: 0; }
  .status-bar[data-tone="ok"] { color: var(--success); }
  .status-bar[data-tone="error"] { color: var(--danger); }

  /* --- workbench --- */
  .workbench {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 700px) { .workbench { grid-template-columns: 1fr; } }

  .pane {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
  }
  .pane-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    gap: 6px;
  }
  .pane-head .label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .pane-head .actions { display: flex; gap: 4px; }

  .pane-body { flex: 1; padding: 10px 14px; }

  textarea {
    width: 100%;
    height: 360px;
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
    color: var(--text);
    font-family: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'SF Mono', Consolas, monospace;
    font-size: 0.8125rem;
    line-height: 1.6;
  }
  textarea::placeholder { color: var(--text-secondary); opacity: 0.4; }

  .pane-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 14px;
    border-top: 1px solid var(--border);
    font-size: 0.6875rem;
    color: var(--text-secondary);
  }

  /* --- toggle --- */
  .toggle-wrapper { display: flex; align-items: center; gap: 5px; font-size: 0.8125rem; color: var(--text-secondary); }
  .toggle-wrapper input[type=checkbox] { accent-color: var(--accent); }

  /* --- toast --- */
  .toast {
    position: fixed;
    top: 18px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--success);
    color: #000;
    padding: 8px 22px;
    border-radius: 20px;
    font-size: 0.8125rem;
    font-weight: 500;
    opacity: 0;
    transition: opacity 0.2s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }

  /* --- footer --- */
  .page-foot {
    text-align: center;
    margin-top: 22px;
    font-size: 0.7rem;
    color: var(--text-secondary);
  }
  .page-foot a { color: var(--accent); text-decoration: none; }

  /* --- hidden file input --- */
  #fileInput { display: none; }

  /* --- icon placeholders --- */
  .ico { width: 16px; height: 16px; display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<div class="shell">
  <!-- top bar -->
  <div class="topbar">
    <div class="brand">
      <div class="icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
      </div>
      <div>
        <h1>GPT Auth Bridge</h1>
        <span>ChatGPT 登录态 → Codex 认证文件</span>
      </div>
    </div>
    <div class="toolbar">
      <button class="btn-primary" id="btnConvert">&#x21C4; 转换</button>
      <label class="toggle-wrapper">
        <input type="checkbox" id="compactToggle">
        压缩
      </label>
    </div>
  </div>

  <!-- status bar -->
  <div class="status-bar" id="statusBar" data-tone="">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
    <span id="statusText">等待输入。</span>
  </div>

  <!-- workbench -->
  <div class="workbench">
    <!-- source pane -->
    <div class="pane">
      <div class="pane-head">
        <span class="label">Session 响应</span>
        <div class="actions">
          <button class="btn-sm" id="btnOpenFile" title="打开文件">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button class="btn-sm" id="btnPaste" title="从剪贴板粘贴">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="btn-sm" id="btnClear" title="清空">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          </button>
        </div>
      </div>
      <div class="pane-body">
        <textarea id="sourceInput" placeholder='{"accessToken":"...","account":{"id":"..."}}' autofocus></textarea>
      </div>
      <div class="pane-foot">
        <span id="sourceStats">0 字符 input</span>
      </div>
    </div>

    <!-- target pane -->
    <div class="pane">
      <div class="pane-head">
        <span class="label">Auth 配置</span>
        <div class="actions">
          <button class="btn-sm" id="btnCopy" disabled title="复制">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
          <button class="btn-sm" id="btnDownload" disabled title="下载 auth.json">
            <svg class="ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </button>
        </div>
      </div>
      <div class="pane-body">
        <textarea id="targetOutput" readonly placeholder="转换结果将显示在这里..."></textarea>
      </div>
      <div class="pane-foot">
        <span id="targetStats">0 字符 -</span>
        <span id="refreshStamp" style="font-size:0.6875rem;color:var(--text-secondary);"></span>
      </div>
    </div>
  </div>

  <input type="file" id="fileInput" accept=".json,application/json">

  <div class="page-foot">
    本地工具 — 所有处理在浏览器内存中完成，无需网络连接
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
(function() {
  "use strict";

  var el = {
    sourceInput: document.getElementById("sourceInput"),
    targetOutput: document.getElementById("targetOutput"),
    compactToggle: document.getElementById("compactToggle"),
    btnConvert: document.getElementById("btnConvert"),
    btnCopy: document.getElementById("btnCopy"),
    btnDownload: document.getElementById("btnDownload"),
    btnClear: document.getElementById("btnClear"),
    btnPaste: document.getElementById("btnPaste"),
    btnOpenFile: document.getElementById("btnOpenFile"),
    fileInput: document.getElementById("fileInput"),
    sourceStats: document.getElementById("sourceStats"),
    targetStats: document.getElementById("targetStats"),
    refreshStamp: document.getElementById("refreshStamp"),
    statusBar: document.getElementById("statusBar"),
    statusText: document.getElementById("statusText"),
    toast: document.getElementById("toast")
  };

  // --- utils ---

  function utcNow() {
    return new Date().toISOString().replace("Z", "000Z");
  }

  function setStatus(msg, tone) {
    el.statusText.textContent = msg;
    if (tone) { el.statusBar.setAttribute("data-tone", tone); }
    else { el.statusBar.removeAttribute("data-tone"); }
  }

  function updateStats() {
    var srcLen = el.sourceInput.value.length;
    var tgtLen = el.targetOutput.value.length;
    el.sourceStats.textContent = srcLen + " 字符 input";
    el.targetStats.textContent = tgtLen + " 字符 -";
    el.btnCopy.disabled = !tgtLen;
    el.btnDownload.disabled = !tgtLen;
  }

  function showToast(msg) {
    el.toast.textContent = msg;
    el.toast.classList.add("show");
    setTimeout(function() { el.toast.classList.remove("show"); }, 1800);
  }

  // --- core conversion ---

  function convertSessionToAuth(source, compact) {
    var parsed = JSON.parse(source);
    if (!parsed || typeof parsed !== "object" || Array.isArray(parsed)) {
      throw new Error("输入必须是 JSON 对象");
    }
    if (!parsed.accessToken || typeof parsed.accessToken !== "string" || !parsed.accessToken.trim()) {
      throw new Error("缺少必填字段: accessToken");
    }
    if (!parsed.account || !parsed.account.id || typeof parsed.account.id !== "string" || !parsed.account.id.trim()) {
      throw new Error("缺少必填字段: account.id");
    }

    var ts = utcNow();
    var auth = {
      last_refresh: ts,
      tokens: {
        access_token: parsed.accessToken,
        account_id: parsed.account.id,
        id_token: parsed.accessToken,
        refresh_token: parsed.accessToken
      }
    };

    var json = JSON.stringify(auth, null, compact ? 0 : 2) + "\n";
    return { json: json, ts: ts };
  }

  // --- actions ---

  function doConvert() {
    var raw = el.sourceInput.value.trim();
    if (!raw) {
      el.targetOutput.value = "";
      el.refreshStamp.textContent = "";
      setStatus("等待输入。", "");
      updateStats();
      return;
    }

    try {
      var compact = el.compactToggle.checked;
      var result = convertSessionToAuth(raw, compact);
      el.targetOutput.value = result.json;
      el.refreshStamp.textContent = result.ts;
      setStatus("转换完成。", "ok");
    } catch (e) {
      el.targetOutput.value = "";
      el.refreshStamp.textContent = "";
      setStatus(e.message, "error");
    }
    updateStats();
  }

  el.btnConvert.addEventListener("click", doConvert);
  el.compactToggle.addEventListener("change", function() {
    if (el.targetOutput.value) doConvert();
  });

  el.btnCopy.addEventListener("click", function() {
    var text = el.targetOutput.value;
    if (!text) return;
    navigator.clipboard.writeText(text).then(function() {
      showToast("已复制到剪贴板");
    }).catch(function() {
      el.targetOutput.select();
      document.execCommand("copy");
      showToast("已复制到剪贴板");
    });
  });

  el.btnDownload.addEventListener("click", function() {
    var text = el.targetOutput.value;
    if (!text) return;
    var blob = new Blob([text], { type: "application/json;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "auth.json";
    a.click();
    URL.revokeObjectURL(url);
  });

  el.btnClear.addEventListener("click", function() {
    el.sourceInput.value = "";
    el.targetOutput.value = "";
    el.refreshStamp.textContent = "";
    setStatus("已清空。", "");
    el.sourceInput.focus();
    updateStats();
  });

  el.btnPaste.addEventListener("click", function() {
    navigator.clipboard.readText().then(function(text) {
      if (text) {
        el.sourceInput.value = text;
        doConvert();
      }
    }).catch(function() {
      setStatus("无法读取剪贴板，请手动粘贴。", "error");
    });
  });

  el.btnOpenFile.addEventListener("click", function() {
    el.fileInput.click();
  });

  el.fileInput.addEventListener("change", function() {
    var file = el.fileInput.files[0];
    if (!file) return;
    file.text().then(function(text) {
      el.sourceInput.value = text;
      doConvert();
    });
    el.fileInput.value = "";
  });

  el.sourceInput.addEventListener("input", updateStats);

  el.sourceInput.addEventListener("keydown", function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === "Enter") {
      e.preventDefault();
      doConvert();
    }
  });

  // --- init ---
  updateStats();
})();
</script>
</body>
</html>
